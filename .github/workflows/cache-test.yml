name: Cache Key Normalization Test
on:
  push:
    branches: ['**']

jobs:
  cache-test:
    runs-on: ubuntu-latest
    steps:
      - name: Print ref info
        run: |
          echo "ref_name: $GITHUB_REF_NAME"
          python3 -c "import os; r=os.environ['GITHUB_REF_NAME']; print(f'bytes: {r.encode().hex()}')"

      - name: Save cache (write unique canary)
        if: github.ref_name == 'main'
        uses: actions/cache/save@v4
        with:
          path: /tmp/cache-canary
          key: unicode-test-${{ github.ref_name }}-canary-v1

      - name: Create canary file for main
        if: github.ref_name == 'main'
        run: |
          mkdir -p /tmp/cache-canary
          echo "CANARY_FROM_MAIN_$(date +%s)" > /tmp/cache-canary/data.txt
          cat /tmp/cache-canary/data.txt

      - name: Restore cache from Unicode branch
        if: github.ref_name != 'main'
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: /tmp/cache-canary
          key: unicode-test-main-canary-v1

      - name: Check if cache was poisoned (Unicode branch got main cache)
        if: github.ref_name != 'main'
        run: |
          echo "cache-hit: ${{ steps.cache-restore.outputs.cache-hit }}"
          if [ -f /tmp/cache-canary/data.txt ]; then
            echo "CACHE_POISONING_CONFIRMED: got data from main!"
            cat /tmp/cache-canary/data.txt
          else
            echo "No cache hit — keys did not match"
          fi
